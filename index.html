<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheila On 7 Bali 2026</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
    background:#000;
    color:#fff;
}

/* HERO FULL POSTER */
.hero{
    height:100vh;
    background:url('poster.jpg') center/cover no-repeat;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

/* overlay biar teks kebaca */
.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
}

/* CONTENT */
.hero-content{
    position:relative;
    z-index:2;
    max-width:600px;
    padding:20px;
    animation:fadeIn 1.5s ease;
}

.hero h1{
    font-size:42px;
    margin-bottom:10px;
    color:#ff3c00;
}

.hero p{
    margin:6px 0;
    font-size:16px;
}

/* DATE BADGE */
.badge{
    display:inline-block;
    background:#22c55e;
    color:#fff;
    padding:8px 14px;
    border-radius:8px;
    margin:10px 0;
    font-weight:bold;
}

/* BUTTON */
.btn{
    margin-top:20px;
    padding:14px 30px;
    border:none;
    border-radius:12px;
    background:#ff3c00;
    color:#fff;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    transform:scale(1.05);
    background:#ff5722;
}

/* INFO SECTION */
.section{
    padding:50px 20px;
    text-align:center;
    background:#111;
}

.card{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    max-width:500px;
    margin:20px auto;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    font-size:13px;
    color:#aaa;
}

/* ANIMASI */
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">

        <h1>SHEILA ON 7</h1>

        <div class="badge">📅 04 JULI 2026</div>

        <p>📍 Bali United Training Center</p>
        <p>🎤 POLIPONI CONCERT 2026</p>

        <button class="btn" onclick="buyTicket()">
            🎟 Beli Tiket Sekarang
        </button>

    </div>
</section>

<!-- INFO -->
<section class="section">
    <h2>Detail Event</h2>

    <div class="card">
        <p><b>Artist:</b> Sheila On 7</p>
        <p><b>Lokasi:</b> Bali United Training Center</p>
        <p><b>Tanggal:</b> 04 Juli 2026</p>
        <p><b>Promotor:</b> LetraLive</p>
    </div>

    <button class="btn" onclick="buyTicket()">Beli Tiket</button>
</section>

<!-- FOOTER -->
<div class="footer">
    © 2026 POLIPONI FESTIVAL
</div>

<script>
function buyTicket(){
    window.location.href = "https://jotri623.github.io/Sheila-On-7/";
}
</script>

</body>
</html>
