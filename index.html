<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sheila On 7 Bali 2026</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}

body{
    background:#000;
    color:#fff;
}

/* HERO */
.hero{
    height:100vh;
    background:url('poster.jpg') center/cover no-repeat;
    position:relative;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    text-align:center;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.2));
}

/* CONTENT */
.hero-content{
    position:relative;
    z-index:2;
    padding:30px 20px;
    max-width:600px;
    width:100%;
    animation:fadeIn 1.2s ease;
}

.hero h1{
    font-size:36px;
    color:#ff3c00;
    margin-bottom:10px;
}

.hero p{
    font-size:15px;
    margin:5px 0;
}

/* BADGE */
.badge{
    display:inline-block;
    background:#22c55e;
    padding:6px 12px;
    border-radius:8px;
    margin:10px 0;
    font-weight:bold;
}

/* COUNTDOWN */
.countdown{
    margin-top:12px;
    font-size:14px;
    color:#facc15;
}

/* PROGRESS */
.progress-container{
    margin-top:12px;
    width:100%;
    background:#333;
    border-radius:10px;
    overflow:hidden;
}

.progress-bar{
    height:10px;
    width:0%;
    background:#ff3c00;
    transition:width 2s ease;
}

/* BUTTON */
.btn{
    margin-top:15px;
    padding:14px 25px;
    border:none;
    border-radius:10px;
    background:#ff3c00;
    color:#fff;
    font-size:15px;
    cursor:pointer;
    transition:.3s;
    width:100%;
}

.btn:hover{
    transform:scale(1.03);
    background:#ff5722;
}

/* SECTION */
.section{
    padding:40px 20px;
    background:#111;
    text-align:center;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
}

/* FOOTER */
.footer{
    text-align:center;
    padding:20px;
    font-size:13px;
    color:#aaa;
}

/* ANIMASI */
@keyframes fadeIn{
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">

        <h1>SHEILA ON 7</h1>

        <div class="badge">📅 04 JULI 2026</div>

        <p>📍 Bali United Training Center</p>
        <p>🎤 POLIPONI CONCERT 2026</p>

        <!-- COUNTDOWN -->
        <div class="countdown" id="countdown">
            ⏳ Menghitung waktu...
        </div>

        <!-- PROGRESS -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p style="font-size:12px;margin-top:5px;color:#aaa;">
            ⚠️ 70% Tiket Telah Terjual
        </p>

        <button class="btn" onclick="buyTicket()">
            🎟 Beli Tiket Sekarang
        </button>

    </div>
</section>

<!-- INFO -->
<section class="section">
    <h2>Detail Event</h2>

    <div class="card">
        <p><b>Artist:</b> Sheila On 7</p>
        <p><b>Lokasi:</b> Bali United Training Center</p>
        <p><b>Tanggal:</b> 04 Juli 2026</p>
        <p><b>Promotor:</b> LetraLive</p>
    </div>

    <br>

    <button class="btn" onclick="buyTicket()">Beli Tiket</button>
</section>

<!-- FOOTER -->
<div class="footer">
    © 2026 POLIPONI FESTIVAL
</div>

<script>
// REDIRECT
function buyTicket(){
    window.location.href = "https://soekarnofestrun2026-rgb.github.io/Bali-United-training-center/";
}

// COUNTDOWN (SET DEADLINE DISINI)
const deadline = new Date("June 30, 2026 23:59:59").getTime();

setInterval(function(){
    const now = new Date().getTime();
    const distance = deadline - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60))/(1000*60));
    const seconds = Math.floor((distance % (1000*60))/1000);

    document.getElementById("countdown").innerHTML =
        "⏳ Batas beli: " + days + "h " + hours + "j " + minutes + "m " + seconds + "d";

},1000);

// PROGRESS ANIMATION
window.onload = function(){
    setTimeout(()=>{
        document.getElementById("progressBar").style.width = "70%";
    },500);
}
</script>

</body>
</html>
